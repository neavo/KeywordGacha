name: Sync

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "源仓库"
        required: true
        default: "neavo/LinguaGacha"
      source_ref:
        description: "源分支/标签/提交"
        required: true
        default: "main"
      target_branch:
        description: "目标分支/标签/提交"
        required: true
        default: "main"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve Sync Meta
        id: resolve_meta
        shell: bash
        env:
          TARGET_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          resolve_brand_id() {
            case "$1" in
              "neavo/LinguaGacha")
                echo "lg"
                ;;
              "neavo/KeywordGacha")
                echo "kg"
                ;;
              *)
                return 1
              ;;
            esac
          }

          target_brand_id="$(resolve_brand_id "$TARGET_REPO")" || {
            echo "::error::Unsupported target_repo: $TARGET_REPO"
            exit 1
          }

          echo "target_brand_id=${target_brand_id}" >> "$GITHUB_OUTPUT"
          echo "target_repo=${TARGET_REPO}" >> "$GITHUB_OUTPUT"

          echo "target_repo=${TARGET_REPO}"
          echo "target_brand_id=${target_brand_id}"

      - name: Prepare Source Tree
        id: prepare_tree
        shell: bash
        env:
          # 使用自定义 PAT，避免 github.token 无法跨仓库更新工作流文件。
          GITHUB_TOKEN: ${{ secrets.CI_SYNC_TOKEN }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          TARGET_REPO: ${{ steps.resolve_meta.outputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          TARGET_BRAND_ID: ${{ steps.resolve_meta.outputs.target_brand_id }}
        run: |
          set -euo pipefail

          work_root="$(mktemp -d)"
          source_dir="${work_root}/source"
          target_overlay_dir=""
          brand_applied="false"
          target_remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git"
          old_sha=""

          git clone "https://github.com/${SOURCE_REPO}.git" "$source_dir"

          cd "$source_dir"
          git checkout "$SOURCE_REF"
          old_sha="$(git ls-remote "$target_remote" "refs/heads/${TARGET_BRANCH}" | cut -f1)"

          target_overlay_dir="brands/${TARGET_BRAND_ID}"

          # 根目录是默认资源；目标品牌目录里存在的文件才覆盖进去。
          if [[ -d "$target_overlay_dir" ]]; then
            rsync -a "${target_overlay_dir}/" ./
            brand_applied="true"
          fi

          git add -A
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "apply ${TARGET_BRAND_ID} brand"
          fi

          echo "work_root=${work_root}" >> "$GITHUB_OUTPUT"
          echo "source_dir=${source_dir}" >> "$GITHUB_OUTPUT"
          echo "old_sha=${old_sha}" >> "$GITHUB_OUTPUT"
          echo "brand_applied=${brand_applied}" >> "$GITHUB_OUTPUT"

          echo "source_ref=${SOURCE_REF}"
          echo "target_branch=${TARGET_BRANCH}"
          echo "old_sha=${old_sha}"
          echo "brand_applied=${brand_applied}"

      - name: Push Prepared Tree
        shell: bash
        env:
          # 使用自定义 PAT，避免 github.token 无法跨仓库更新工作流文件。
          GITHUB_TOKEN: ${{ secrets.CI_SYNC_TOKEN }}
          TARGET_REPO: ${{ steps.resolve_meta.outputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          SOURCE_DIR: ${{ steps.prepare_tree.outputs.source_dir }}
          OLD_SHA: ${{ steps.prepare_tree.outputs.old_sha }}
        run: |
          set -euo pipefail

          cd "$SOURCE_DIR"
          target_remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git"

          if [[ -n "$OLD_SHA" ]]; then
            git push "$target_remote" "HEAD:refs/heads/${TARGET_BRANCH}" --force-with-lease="refs/heads/${TARGET_BRANCH}:${OLD_SHA}"
          else
            git push "$target_remote" "HEAD:refs/heads/${TARGET_BRANCH}"
          fi
